name: 🧬 ATENA Ω - Evolução Divina v4.0 (AGI Level)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      generations:
        description: 'Número de gerações'
        required: true
        default: '30'
        type: choice
        options:
          - '3'
          - '5'
          - '10'
          - '20'
          - '50'
      mode:
        description: 'Modo de evolução'
        required: true
        default: 'auto'
        type: choice
        options:
          - 'auto'
          - 'recon'
          - 'nocode'
      recon_topic:
        description: 'Tópico para Hacker Recon (se mode=recon)'
        required: false
        default: 'advanced python optimization'
      nocode_desc:
        description: 'Descrição do projeto No-Code (se mode=nocode)'
        required: false
        default: 'a simple flask web app with sqlite'
      deep_self_mod:
        description: 'Permite que a Atena modifique o próprio engine'
        required: false
        default: true
        type: boolean
      checker_evolve:
        description: 'Permite que o AdaptiveChecker evolua suas regras'
        required: false
        default: true
        type: boolean
      lm_enabled:
        description: 'Ativa o modelo de linguagem local (AtenaLocalLM)'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  actions: write

concurrency:
  group: atena-evolution
  cancel-in-progress: false # ALTERADO: Impede que o GitHub mate o processo se um novo ciclo começar

env:
  PYTHON_VERSION: '3.11'
  GENERATIONS: ${{ github.event.inputs.generations || '10' }}
  MODE: ${{ github.event.inputs.mode || 'auto' }}
  RECON_TOPIC: ${{ github.event.inputs.recon_topic || 'advanced python optimization' }}
  NOCODE_DESC: ${{ github.event.inputs.nocode_desc || 'a simple flask web app with sqlite' }}
  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
  XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
  NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
  DEPLOY_GIT_REPO: ${{ secrets.DEPLOY_GIT_REPO }}
  DEPLOY_DOCKER_IMAGE: ${{ secrets.DEPLOY_DOCKER_IMAGE }}
  DEPLOY_COMMAND: ${{ secrets.DEPLOY_COMMAND }}
  ALLOW_WORKFLOW_MUTATION: 'true'
  LT_INTERVAL: '1'
  LT_VERBOSE: 'false'
  GROK_LT_INTERVAL: '5'
  VH_INTERVAL_HOURS: '6'
  DASHBOARD_PORT: '7331'
  ALLOW_DEEP_SELF_MOD: ${{ github.event.inputs.deep_self_mod == 'true' && 'true' || 'false' }}
  ALLOW_CHECKER_EVOLVE: ${{ github.event.inputs.checker_evolve == 'true' && 'true' || 'false' }}
  SELF_MOD_INTERVAL: '10'
  RECURSIVE_CYCLES: '3'
  MAX_ENGINE_MUTATIONS: '3'
  ATENA_LM_ENABLED: ${{ github.event.inputs.lm_enabled != 'false' && 'true' || 'false' }}
  ATENA_LM_TRAIN_EVERY: '5'
  ATENA_LM_EMBED_DIM: '128'
  ATENA_LM_LAYERS: '4'
  ATENA_LM_MIN_SAMPLES: '5'
  MIN_IMPROVEMENT_DELTA: '0.001'
  CANDIDATES_PER_CYCLE: '6'
  PARALLEL_WORKERS: '4'
  TRAINING_INTERVAL: '900'
  PYTHONFAULTHANDLER: '1'
  PYTHONUNBUFFERED: '1'

jobs:
  evoluir:
    name: 🧠 Evolução Neural v4.0 (AGI Level)
    runs-on: ubuntu-latest
    timeout-minutes: 60 # Aumentado para dar margem à evolução

    steps:
    - name: ⚡ Banner
      run: |
        echo "╔═══════════════════════════════════════════════════════╗"
        echo "║     ATENA Ω - EVOLUÇÃO DIVINA v4.0 (AGI LEVEL)        ║"
        echo "╚═══════════════════════════════════════════════════════╝"

    - name: 📥 Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip' # Cache nativo do setup-python

    - name: 🔧 Instalar dependências de sistema
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y python3-dev build-essential sqlite3 jq tesseract-ocr

    - name: 📦 Instalar dependências Python
      run: |
        python -m pip install --upgrade pip setuptools wheel
        # Instalação com timeout aumentado para evitar quedas no PyTorch
        python -m pip install --default-timeout=100 --upgrade --quiet torch torchvision --index-url https://download.pytorch.org/whl/cpu
        python install.py

    - name: 🧪 Executar testes rápidos
      run: python quick_test.py || echo "Aviso: Alguns testes falharam, mas prosseguindo..."

    - name: 🔱 Executar Teste de Estresse AGI
      run: python atena_stress_test.py
      continue-on-error: true

    - name: 🔍 Verificar importação de main.py
      run: python -c "import main; print('main.py importado com sucesso')"

    - name: 📂 Criar diretórios de memória
      run: |
        mkdir -p atena_evolution/{code,backups/selfmod,knowledge,sandbox,models,deploy,projects,lm/{model,checkpoints,data},logs}

    - name: 🧠 Restaurar memória do run anterior
      run: |
        echo "Tentando restaurar brain data..."
        ARTIFACT_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=1" --jq '.artifacts[0].id' 2>/dev/null || echo "")
        if [ -z "$ARTIFACT_ID" ]; then
          echo "Nenhum artefato encontrado."
        else
          gh api "repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip" > brain.zip
          unzip -o brain.zip -d . && rm brain.zip
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    - name: 🔮 Executar ATENA Core v4.0 (AGI Level)
      id: execucao
      run: |
        EXTRA_ARGS=""
        [ "${{ env.ALLOW_DEEP_SELF_MOD }}" == "true" ] && EXTRA_ARGS="$EXTRA_ARGS --deep"
        [ "${{ env.ALLOW_CHECKER_EVOLVE }}" == "true" ] && EXTRA_ARGS="$EXTRA_ARGS --checker"

        if [ "${{ env.MODE }}" == "recon" ]; then
          python main.py --recon "${{ env.RECON_TOPIC }}" $EXTRA_ARGS
        elif [ "${{ env.MODE }}" == "nocode" ]; then
          python main.py --nocode --desc "${{ env.NOCODE_DESC }}" $EXTRA_ARGS
        else
          python main.py --auto --cycles ${{ env.GENERATIONS }} $EXTRA_ARGS
        fi

    - name: 📊 Gerar Relatório de Inteligência
      if: always()
      run: |
        echo "# 🧬 Relatório ATENA Ω" > relatorio.md
        echo "- Status: ${{ steps.execucao.outcome }}" >> relatorio.md

    - name: ⬆️ Upload Artefatos
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: atena-brain-data-${{ github.run_id }}
        path: |
          atena_evolution/knowledge/knowledge.db
          atena_evolution/models/
          atena_evolution/logs/
          atena_evolution/agi_stress_test_report.json
        retention-days: 7
