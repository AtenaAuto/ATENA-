name: 🧬 ATENA Ω - Evolução Divina v4.0 (AGI Level)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      generations:
        description: 'Número de gerações'
        required: true
        default: '30'
        type: choice
        options: ['3', '5', '10', '20', '50']
      mode:
        description: 'Modo de evolução'
        required: true
        default: 'auto'
        type: choice
        options: ['auto', 'recon', 'nocode']
      deep_self_mod:
        description: 'Permite que a Atena modifique o próprio engine'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  actions: write
  repository-projects: read

concurrency:
  group: atena-evolution
  cancel-in-progress: false # IMPORTANTE: Não cancela o anterior para não dar erro de "Operation Canceled"

env:
  PYTHON_VERSION: '3.11'
  GENERATIONS: ${{ github.event.inputs.generations || '10' }}
  MODE: ${{ github.event.inputs.mode || 'auto' }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # Adicione seus outros envs aqui se necessário

jobs:
  evoluir:
    name: 🧠 Evolução Neural v4.0
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: 🔧 Instalar dependências de sistema
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y python3-dev build-essential sqlite3 jq tesseract-ocr

    - name: 📦 Instalar dependências Python (Correção de Erro)
      run: |
        python -m pip install --upgrade pip setuptools wheel
        # Instala o Torch separadamente com timeout para não cair
        python -m pip install --default-timeout=100 torch torchvision --index-url https://download.pytorch.org/whl/cpu
        # Instala o restante das dependências
        if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
        python install.py || echo "install.py executado"

    - name: 📂 Preparar Estrutura de Pastas
      run: |
        mkdir -p atena_evolution/code atena_evolution/backups atena_evolution/knowledge atena_evolution/models atena_evolution/logs atena_evolution/lm/model

    - name: 🧠 Restaurar Memória (Atena Brain)
      run: |
        echo "Buscando última memória salva..."
        # Busca o ID do último artefato de sucesso via GitHub CLI
        LAST_ARTIFACT_ID=$(gh run list --workflow "${{ github.workflow }}" --status success --limit 1 --json databaseId -q '.[0].databaseId' 2>/dev/null || echo "")
        
        if [ -n "$LAST_ARTIFACT_ID" ]; then
          gh run download $LAST_ARTIFACT_ID -n "atena-brain-data" --dir . || echo "Nenhum artefato encontrado"
          if [ -f brain.zip ]; then unzip -o brain.zip; fi
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    - name: 🔮 Executar ATENA Core v4.0
      id: execucao
      run: |
        echo "🚀 Iniciando motor de evolução..."
        EXTRA_ARGS=""
        if [ "${{ github.event.inputs.deep_self_mod }}" == "true" ]; then EXTRA_ARGS="--deep"; fi
        
        if [ "${{ env.MODE }}" == "recon" ]; then
          python main.py --recon "advanced python optimization" $EXTRA_ARGS
        else
          python main.py --auto --cycles ${{ env.GENERATIONS }} $EXTRA_ARGS
        fi

    - name: ⬆️ Salvar Evolução (Upload Artefatos)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: atena-brain-data
        path: |
          atena_evolution/knowledge/knowledge.db
          atena_evolution/models/
          atena_evolution/logs/
          modules/auto_*.py
        retention-days: 5
