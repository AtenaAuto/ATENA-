name: 🧬 ATENA Ω - Evolução Divina v4.2 (DeepSeek-R1 Edition)

on:
  schedule:
    - cron: '0 */30 * * *' # Executa a cada 30 minutus para economizar recursos
  workflow_dispatch:
    inputs:
      model_size:
        description: 'Tamanho do modelo DeepSeek-R1'
        required: true
        default: '1.5B'
        type: choice
        options:
          - '1.5B'
          - '7B'
      generations:
        description: 'Número de gerações'
        required: true
        default: '5'
        type: choice
        options:
          - '10'
          - '30'
          - '50'
      mode:
        description: 'Modo de evolução'
        required: true
        default: 'auto'
        type: choice
        options:
          - 'auto'
          - 'recon'
          - 'nocode'

permissions:
  contents: write
  actions: write

jobs:
  evoluir:
    name: 🧠 Evolução Neural (${{ matrix.model_size }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model_size: [1.5B] 
    
    env:
      PYTHON_VERSION: '3.11'
      MODEL_SIZE: ${{ github.event.inputs.model_size || matrix.model_size }}
      GENERATIONS: ${{ github.event.inputs.generations || '5' }}
      MODE: ${{ github.event.inputs.mode || 'auto' }}
      LLM_MODEL_NAME: ${{ (github.event.inputs.model_size || matrix.model_size) == '7B' && 'deepseek-ai/DeepSeek-R1-Distill-Qwen-7B' || 'deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B' }}

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        # Removido cache temporariamente para garantir instalação limpa se necessário
        # cache: 'pip'

    - name: 🔧 Instalar dependências
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y sqlite3
        python -m pip install --upgrade pip
        python -m pip install requests torch transformers accelerate faiss-cpu astor

    - name: 📂 Preparar Estrutura
      run: |
        mkdir -p atena_evolution/code atena_evolution/knowledge atena_evolution/logs

    - name: 🔮 Executar ATENA Core
      run: |
        echo "🚀 Iniciando motor com DeepSeek-R1-${{ env.MODEL_SIZE }}..."
        python core/main.py --auto --cycles ${{ env.GENERATIONS }}

    - name: ⬆️ Salvar Evolução
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: atena-brain-${{ env.MODEL_SIZE }}
        path: |
          atena_evolution/knowledge/knowledge.db
          atena_evolution/logs/
        retention-days: 3
        
