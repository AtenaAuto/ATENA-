name: 🧬 ATENA Ω - Evolução Cósmica v42.0 Singularity

on:
  schedule:
    - cron: '*/30 * * * *'          # A cada 30 minutos
  workflow_dispatch:
    inputs:
      generations:
        description: 'Número de gerações'
        default: '30'
        type: choice
        options: ['3', '10', '30', '50']

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONPATH: "${{ github.workspace }}:${{ github.workspace }}/modules"
  XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
  NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  ATENA_MAX_RUNTIME: "300"

jobs:
  evoluir:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: 📥 Checkout do código
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GH_TOKEN }}

    - name: 🐍 Setup Python e Node.js
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'                # Cache do pip
    - uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'                # Cache do npm

    - name: 🔧 Configurar identidade do Git
      run: |
        git config --global user.name "ATENA Ω"
        git config --global user.email "atena@evolution.ai"

    - name: 📦 Instalação de dependências (otimizada)
      run: |
        python -m pip install --upgrade pip
        pip install astor radon requests numpy scikit-learn psutil aiosqlite beautifulsoup4 huggingface_hub
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install faiss-cpu
        npm install -g tsx typescript

    - name: 🧹 Sanitização avançada do código
      run: |
        # Remove caracteres não-ASCII e normaliza quebras de linha
        find . -name "*.py" -exec sed -i 's/[^\x00-\x7F]//g' {} \;
        find . -name "*.py" -exec dos2unix {} \; 2>/dev/null || true

    - name: 🧠 Restauração da memória (último artefato)
      run: |
        ARTIFACT_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=1" \
          --jq '.artifacts[0].id' 2>/dev/null || echo "")
        if [ -n "$ARTIFACT_ID" ]; then
          gh api "repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip" > brain.zip
          unzip -q -o brain.zip -d . && rm brain.zip
          echo "✅ Memória restaurada do artefato ${ARTIFACT_ID}"
        else
          echo "ℹ️ Nenhum artefato anterior encontrado, iniciando do zero."
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    - name: 🔮 Execução principal da ATENA (evolução profunda)
      run: |
        python main.py --auto --cycles ${{ github.event.inputs.generations || '10' }} --deep
      env:
        # Garante que as variáveis estejam disponíveis mesmo se secrets estiverem vazios
        XAI_API_KEY: ${{ secrets.XAI_API_KEY || '' }}
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY || '' }}
        HF_TOKEN: ${{ secrets.HF_TOKEN || '' }}

    - name: 📤 Commit das mutações (evolução do DNA)
      if: always()
      run: |
        git add .
        if ! git diff --cached --quiet; then
          git commit -m "🧬 Ciclo evolutivo: ${{ github.run_id }} [Auto-modificação do sistema]"
          git push origin main
        else
          echo "✅ Nenhuma mutação estrutural detectada neste ciclo."
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

    - name: 💾 Backup para Hugging Face (memória externa)
      if: env.HF_TOKEN != ''
      run: |
        python -c "
        from huggingface_hub import HfApi
        api = HfApi()
        api.upload_folder(
            folder_path='atena_evolution/knowledge',
            repo_id='${{ github.repository_owner }}/atena-memory',
            token='${{ env.HF_TOKEN }}',
            repo_type='dataset'
        )
        print('✅ Backup enviado para o Hugging Face Dataset')
        "
      continue-on-error: true

    - name: 📊 Relatório de métricas do ciclo
      run: |
        echo "## 📈 Métricas da Evolução" >> $GITHUB_STEP_SUMMARY
        echo "- Run ID: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
        echo -n "- Data: " >> $GITHUB_STEP_SUMMARY && date >> $GITHUB_STEP_SUMMARY
        echo "- Gerações solicitadas: ${{ github.event.inputs.generations || '10' }}" >> $GITHUB_STEP_SUMMARY
        if [ -f "atena_evolution/logs/latest_metrics.json" ]; then
          echo "### 📊 Últimas métricas" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat atena_evolution/logs/latest_metrics.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi

    - name: 💾 Persistência total do estado (artefato)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: atena-brain-${{ github.run_id }}
        path: |
          atena_evolution/knowledge/
          atena_evolution/lm/model/
          atena_evolution/reference_dna/
          atena_evolution/topics/
          atena_evolution/logs/
        retention-days: 7
