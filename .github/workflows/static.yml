class EnhancedMockCore:
    """MockCore melhorado com acesso real ao conhecimento."""
    
    class KnowledgeBase:
        def __init__(self, db_path: str = "atena_evolution/knowledge/knowledge.db"):
            try:
                self.conn = sqlite3.connect(db_path, check_same_thread=False)
                self.conn.row_factory = sqlite3.Row
            except sqlite3.OperationalError as e:
                logger.warning(f"Banco de dados não acessível: {e}")
                self.conn = None
        
        def get_learned_functions(self, limit: int = 10) -> List[Dict]:
            """Recupera funções aprendidas."""
            if not self.conn:
                return []
            try:
                rows = self.conn.execute(
                    "SELECT function_name, code, purpose, complexity FROM learned_functions "
                    "ORDER BY usage_count DESC LIMIT ?",
                    (limit,)
                ).fetchall()
                return [dict(row) for row in rows]
            except Exception as e:
                logger.debug(f"Erro ao buscar funções: {e}")
                return []
        
        def get_evolution_stats(self) -> Dict:
            """Estatísticas de evolução."""
            if not self.conn:
                return {}
            try:
                gen = self.conn.execute(
                    "SELECT MAX(generation) FROM evolution_metrics"
                ).fetchone()[0] or 0
                
                improved = self.conn.execute(
                    "SELECT COUNT(*) FROM evolution_metrics WHERE replaced=1"
                ).fetchone()[0] or 0
                
                best = self.conn.execute(
                    "SELECT MAX(new_score) FROM evolution_metrics WHERE replaced=1"
                ).fetchone()[0] or 0
                
                mutations = self.conn.execute(
                    "SELECT mutation, COUNT(*) as count FROM evolution_metrics "
                    "GROUP BY mutation ORDER BY count DESC LIMIT 5"
                ).fetchall()
                
                return {
                    "generations": gen,
                    "improved": improved,
                    "best_score": round(best, 2),
                    "top_mutations": {row[0]: row[1] for row in mutations}
                }
            except Exception as e:
                logger.debug(f"Erro ao coletar stats: {e}")
                return {}
        
        def get_objectives(self) -> List[Dict]:
            """Objetivos atuais."""
            if not self.conn:
                return []
            try:
                rows = self.conn.execute(
                    "SELECT name, description, current_value, target_value FROM objectives "
                    "WHERE active=1 ORDER BY weight DESC"
                ).fetchall()
                return [dict(row) for row in rows]
            except Exception as e:
                logger.debug(f"Erro ao buscar objetivos: {e}")
                return []
    
    def __init__(self):
        self.kb = self.KnowledgeBase()
        self.mutation_engine = None
        self.generation = 0
        self.best_score = 0.0
        self._update_stats()
    
    def _update_stats(self):
        """Atualiza estatísticas do banco."""
        stats = self.kb.get_evolution_stats()
        self.generation = stats.get("generations", 0)
        self.best_score = stats.get("best_score", 0.0)


class ConversationContext:
    """Gerencia contexto e histórico de conversa."""
    
    def __init__(self, max_history: int = 10):
        self.history: deque = deque(maxlen=max_history)
        self.metadata: Dict = {
            "session_start": datetime.now().isoformat(),
            "turns": 0,
            "tokens_used": 0,
        }
    
    def add_exchange(self, user: str, assistant: str, tokens: int = 0):
        """Adiciona uma troca ao histórico."""
        self.history.append({
            "timestamp": datetime.now().isoformat(),
            "user": user,
            "assistant": assistant,
            "tokens": tokens,
        })
        self.metadata["turns"] += 1
        self.metadata["tokens_used"] += tokens
    
    def get_context_window(self, n_turns: int = 3) -> str:
        """Retorna as últimas N trocas como contexto."""
        relevant = list(self.history)[-n_turns:]
        if not relevant:
            return ""
        
        context = "## Histórico recente:\n"
        for exchange in relevant:
            context += f"Humano: {exchange['user']}\n"
            context += f"ATENA: {exchange['assistant']}\n\n"
        return context
    
    def clear(self):
        """Limpa histórico."""
        self.history.clear()
        self.metadata["turns"] = 0
        self.metadata["tokens_used"] = 0


class PromptEngineer:
    """Engenharia de prompt avançada."""
    
    # Templates para diferentes modos
    TEMPLATES = {
        "conversational": (
            "Você é ATENA Ω, um assistente de código auto-evoluível.\n"
            "Responda de forma natural e informativa.\n"
            "Limite a resposta a 2-3 frases quando possível.\n"
        ),
        "technical": (
            "Você é ATENA Ω, especialista em evolução de código.\n"
            "Forneça análises técnicas detalhadas.\n"
            "Inclua exemplos de código quando relevante.\n"
        ),
        "creative": (
            "Você é ATENA Ω, um sistema criativo de geração de código.\n"
            "Explore soluções inovadoras e originais.\n"
            "Pense fora da caixa.\n"
        ),
    }
    
    @staticmethod
    def build_prompt(
        user_message: str,
        mode: str = "conversational",
        context: Optional[str] = None,
        system_info: Optional[Dict] = None,
    ) -> str:
        """Constrói um prompt otimizado."""
        template = PromptEngineer.TEMPLATES.get(mode, PromptEngineer.TEMPLATES["conversational"])
        
        prompt = template
        
        if system_info:
            prompt += f"\n## Estado Atual:\n"
            if "generation" in system_info:
                prompt += f"- Geração de evolução: {system_info['generation']}\n"
            if "best_score" in system_info:
                prompt += f"- Melhor score: {system_info['best_score']:.2f}\n"
            if "objectives" in system_info:
                prompt += f"- Objetivos ativos: {len(system_info['objectives'])}\n"
        
        if context:
            prompt += f"\n{context}\n"
        
        prompt += f"\nHumano: {user_message}\nATENA: "
        
        return prompt
    
    @staticmethod
    def detect_intent(message: str) -> str:
        """Detecta intenção do usuário para escolher modo."""
        msg_lower = message.lower()
        
        if any(w in msg_lower for w in ["como", "explica", "o que", "qual", "por que", "quando"]):
            return "technical"
        
        if any(w in msg_lower for w in ["cria", "gera", "inova", "novo", "ideia"]):
            return "creative"
        
        return "conversational"


class ResponseCleaner:
    """Limpeza inteligente de respostas geradas."""
    
    @staticmethod
    def extract_response(raw: str, prompt: str) -> str:
        """Extrai resposta limpa do output do modelo."""
        # Remove o prompt do início se ainda estiver lá
        if raw.startswith(prompt):
            raw = raw[len(prompt):]
        
        # Remove marcadores de modelo
        raw = re.sub(r'^(ATENA:|Assistente:|###|---)', '', raw, flags=re.MULTILINE)
        
        # Remove "Humano:" que pode aparecer no final (interrupção)
        raw = re.split(r'\n(Humano:|Usuário:)', raw)[0]
        
        # Remove linhas vazias excessivas
        raw = re.sub(r'\n{3,}', '\n\n', raw)
        
        # Trimpa
        raw = raw.strip()
        
        return raw if raw else "[ATENA parou inesperadamente]"
    
    @staticmethod
    def truncate_smart(text: str, max_lines: int = 10) -> str:
        """Trunca mantendo estrutura."""
        lines = text.split('\n')
        if len(lines) <= max_lines:
            return text
        
        # Mantém primeiras linhas + resumo
        summary = f"\n[... {len(lines) - max_lines} linhas omitidas ...]\n"
        return '\n'.join(lines[:max_lines]) + summary + '\n'.join(lines[-2:])


class SpecialCommands:
    """Gerenciador de comandos especiais."""
    
    COMMANDS = {
        "/status": "Mostra status de evolução",
        "/context": "Exibe contexto atual",
        "/clear": "Limpa histórico de conversa",
        "/modo": "Muda modo (conversational/technical/creative)",
        "/help": "Lista comandos",
        "/objectives": "Mostra objetivos atuais",
        "/functions": "Lista funções aprendidas",
        "/stats": "Estatísticas de evolução",
        "/debug": "Ativa modo debug",
    }
    
    def __init__(self, core: EnhancedMockCore, context: ConversationContext):
        self.core = core
        self.context = context
        self.debug = False
    
    def is_command(self, text: str) -> bool:
        """Verifica se é um comando."""
        return text.strip().startswith('/')
    
    def execute(self, cmd_line: str) -> Optional[str]:
        """Executa um comando e retorna resultado."""
        parts = cmd_line.strip().split(maxsplit=1)
        cmd = parts[0].lower()
        arg = parts[1] if len(parts) > 1 else ""
        
        if cmd == "/help":
            return self._format_help()
        
        elif cmd == "/status":
            return self._format_status()
        
        elif cmd == "/context":
            return self._format_context()
        
        elif cmd == "/clear":
            self.context.clear()
            return "✓ Histórico de conversa limpo."
        
        elif cmd == "/objectives":
            return self._format_objectives()
        
        elif cmd == "/functions":
            return self._format_functions()
        
        elif cmd == "/stats":
            stats = self.core.kb.get_evolution_stats()
            return self._format_dict(stats)
        
        elif cmd == "/debug":
            self.debug = not self.debug
            logger.setLevel(logging.DEBUG if self.debug else logging.WARNING)
            return f"🐛 Debug: {'ativado' if self.debug else 'desativado'}"
        
        elif cmd == "/modo":
            if arg in PromptEngineer.TEMPLATES:
                return f"Modo alterado para: {arg}"
            return f"Modo desconhecido. Opções: {', '.join(PromptEngineer.TEMPLATES.keys())}"
        
        return f"Comando desconhecido: {cmd}"
    
    def _format_help(self) -> str:
        lines = ["📚 COMANDOS DISPONÍVEIS:\n"]
        for cmd, desc in self.COMMANDS.items():
            lines.append(f"  {cmd:<20} {desc}")
        return '\n'.join(lines)
    
    def _format_status(self) -> str:
        lines = [
            "📊 STATUS DE EVOLUÇÃO:\n",
            f"  Geração atual:     {self.core.generation}",
            f"  Melhor score:      {self.core.best_score:.2f}",
            f"  Turnos conversa:   {self.context.metadata['turns']}",
            f"  Tokens utilizados: {self.context.metadata['tokens_used']}",
        ]
        return '\n'.join(lines)
    
    def _format_context(self) -> str:
        if not self.context.history:
            return "📭 Nenhum histórico de conversa ainda."
        
        lines = ["📝 HISTÓRICO RECENTE:\n"]
        for i, exchange in enumerate(list(self.context.history)[-5:], 1):
            lines.append(f"[{i}] Humano: {exchange['user'][:50]}...")
            lines.append(f"    ATENA:  {exchange['assistant'][:50]}...")
        
        return '\n'.join(lines)
    
    def _format_objectives(self) -> str:
        objs = self.core.kb.get_objectives()
        if not objs:
            return "🎯 Nenhum objetivo encontrado."
        
        lines = ["🎯 OBJETIVOS ATUAIS:\n"]
        for obj in objs:
            pct = (obj['current_value'] / obj['target_value'] * 100) if obj['target_value'] > 0 else 0
            bar = '█' * int(pct / 10) + '░' * (10 - int(pct / 10))
            lines.append(f"  {obj['name']:<25} {bar} {pct:.0f}%")
        
        return '\n'.join(lines)
    
    def _format_functions(self) -> str:
        funcs = self.core.kb.get_learned_functions(10)
        if not funcs:
            return "🔧 Nenhuma função aprendida ainda."
        
        lines = ["🔧 FUNÇÕES APRENDIDAS (Top 10):\n"]
        for func in funcs:
            lines.append(
                f"  • {func['function_name']:<20} | "
                f"Complexidade: {func['complexity']:.1f} | "
                f"Propósito: {func['purpose']}"
            )
        
        return '\n'.join(lines)
    
    @staticmethod
    def _format_dict(d: Dict) -> str:
        """Formata dicionário para exibição."""
        lines = []
        for k, v in d.items():
            if isinstance(v, dict):
                lines.append(f"{k}:")
                for k2, v2 in v.items():
                    lines.append(f"  {k2}: {v2}")
            else:
                lines.append(f"{k}: {v}")
        return '\n'.join(lines)


class AtenaHumanInterface:
    """Interface humana principal — versão melhorada."""
    
    BANNER = """
╔════════════════════════════════════════════════════════╗
║        🧬 ATENA Ω — INTERFACE HUMANA v2.0             ║
║                                                        ║
║   Auto-Evolução de Código + Conversação LocalLM       ║
║   Digite /help para comandos especiais                ║
╚════════════════════════════════════════════════════════╝
"""
    
    def __init__(self, debug: bool = False):
        logger.setLevel(logging.DEBUG if debug else logging.WARNING)
        logger.info("Inicializando ATENA Ω v2.0...")
        
        self.core = EnhancedMockCore()
        self.context = ConversationContext(max_history=15)
        self.commands = SpecialCommands(self.core, self.context)
        self.commands.debug = debug
        
        try:
            logger.info("Carregando OrquestradorLM...")
            self.orchestrator = AtenaLMOrchestrator(self.core)
            self.tokenizer = self.orchestrator.tokenizer
        except Exception as e:
            logger.error(f"Falha ao carregar modelo: {e}")
            print(f"❌ Erro crítico: {e}")
            sys.exit(1)
        
        self.current_mode = "conversational"
        self.running = True
    
    def conversar(self):
        """Loop principal de conversa."""
        print(self.BANNER)
        print(f"✅ Conectada ao LocalLM e KnowledgeBase")
        print(f"📊 Gen: {self.core.generation} | Score: {self.core.best_score:.2f}")
        print(f"\nDigite sua mensagem ou /help para comandos.\n")
        
        while self.running:
            try:
                # Prompt customizado
                user_input = input(f"👤 [{self.current_mode}] > ").strip()
                
                if not user_input:
                    continue
                
                # Checagem de comando
                if self.commands.is_command(user_input):
                    result = self.commands.execute(user_input)
                    if result:
                        print(f"\n{result}\n")
                    
                    # Verifica se é comando de sair
                    if user_input.lower() in ["/sair", "/exit", "/quit"]:
                        self.running = False
                    
                    continue
                
                # Gera resposta
                print("\n⏳ Processando...", end='\r')
                
                # Detecta intenção
                self.current_mode = PromptEngineer.detect_intent(user_input)
                
                # Constrói prompt com contexto
                system_info = {
                    "generation": self.core.generation,
                    "best_score": self.core.best_score,
                    "objectives": self.core.kb.get_objectives(),
                }
                
                context_window = self.context.get_context_window(n_turns=2)
                
                prompt = PromptEngineer.build_prompt(
                    user_message=user_input,
                    mode=self.current_mode,
                    context=context_window,
                    system_info=system_info,
                )
                
                # Gera resposta
                try:
                    raw_response = self.orchestrator.generate(
                        hint=prompt,
                        category="new_function",  # Usa o motor
                    )
                except Exception as e:
                    logger.debug(f"Erro na geração: {e}")
                    raw_response = f"[Erro no modelo: {str(e)[:50]}]"
                
                # Limpa resposta
                response = ResponseCleaner.extract_response(raw_response, prompt)
                response = ResponseCleaner.truncate_smart(response, max_lines=15)
                
                # Exibe
                print(f"{'':50}", end='\r')  # Limpa "Processando..."
                print(f"\n🤖 [ATENA]: {response}\n")
                
                # Registra no contexto
                self.context.add_exchange(user_input, response)
                
                # Atualiza stats
                self.core._update_stats()
                
            except KeyboardInterrupt:
                print("\n\n⏹️  Conversa interrompida pelo usuário.")
                self.running = False
            except Exception as e:
                logger.error(f"Erro não tratado: {e}", exc_info=True)
                print(f"⚠️  Erro: {str(e)}")
        
        self._print_session_summary()
    
    def _print_session_summary(self):
        """Exibe resumo da sessão."""
        print("\n" + "="*60)
        print("📋 RESUMO DA SESSÃO")
        print("="*60)
        print(f"Turnos:         {self.context.metadata['turns']}")
        print(f"Tokens usados:  {self.context.metadata['tokens_used']}")
        print(f"Score final:    {self.core.best_score:.2f}")
        print(f"Geração:        {self.core.generation}")
        print("="*60)
        print("✨ Até logo!\n")


def main():
    """Entry point."""
    import argparse
    
    parser = argparse.ArgumentParser(
        description="ATENA Ω - Interface Humana v2.0",
        formatter_class=argparse.RawDescriptionHelpFormatter,
    )
    parser.add_argument(
        "--debug",
        action="store_true",
        help="Ativa modo debug com logs detalhados"
    )
    
    args = parser.parse_args()
    
    try:
        interface = AtenaHumanInterface(debug=args.debug)
        interface.conversar()
    except KeyboardInterrupt:
        print("\n\n⏹️  Encerrado.")
    except Exception as e:
        logger.critical(f"Erro fatal: {e}", exc_info=True)
        print(f"\n❌ Erro crítico: {e}")
        sys.exit(1)


if __name__ == "__main__":
    main()
