name: 🧬 ATENA Ω - Evolução Divina v4.2 (DeepSeek-R1 Edition)

on:
  schedule:
    - cron: '*/30 * * * *' # Executa a cada 30 minutos (sujeito à fila do GitHub)
  workflow_dispatch:
    inputs:
      model_size:
        description: 'Tamanho do modelo DeepSeek-R1'
        required: true
        default: '1.5B'
        type: choice
        options:
          - '1.5B'
          - '7B'
      generations:
        description: 'Número de gerações por ciclo'
        required: true
        default: '30'
        type: choice
        options:
          - '2500'
          - '600'
          - '700'
          - '800'
      mode:
        description: 'Modo de evolução'
        required: true
        default: 'auto'
        type: choice
        options:
          - 'auto'
          - 'recon'
          - 'nocode'

permissions:
  contents: write
  actions: write

jobs:
  evoluir:
    name: 🧠 Evolução Neural (${{ matrix.model_size }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        model_size: [1.5B] 
    
    env:
      PYTHON_VERSION: '3.11'
      MODEL_SIZE: ${{ github.event.inputs.model_size || matrix.model_size }}
      GENERATIONS: ${{ github.event.inputs.generations || '30' }}
      MODE: ${{ github.event.inputs.mode || 'auto' }}
      LLM_MODEL_NAME: ${{ (github.event.inputs.model_size || matrix.model_size) == '7B' && 'deepseek-ai/DeepSeek-R1-Distill-Qwen-7B' || 'deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B' }}

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: 🔧 Instalar dependências
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y sqlite3
        python -m pip install --upgrade pip
        if [ -f setup/requirements.txt ]; then
          python -m pip install -r setup/requirements.txt
        else
          python -m pip install requests torch transformers accelerate faiss-cpu astor sentence-transformers aiosqlite aiohttp
        fi

    - name: 📂 Preparar Estrutura
      run: |
        mkdir -p atena_evolution/code atena_evolution/knowledge atena_evolution/logs
        # Garantir que o diretório modules esteja no lugar certo para o core/main.py
        if [ ! -d core/modules ]; then
          cp -r modules core/ || true
        fi

    - name: 🧠 Baixar Evolução Anterior (Persistência entre ciclos)
      uses: dawidd6/action-download-artifact@v3
      continue-on-error: true
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        workflow: main.yml
        branch: ${{ github.ref_name }}
        name: atena-brain-${{ env.MODEL_SIZE }}
        path: atena_evolution/
        if_no_artifact_found: warn

    - name: 🔮 Executar ATENA Core
      run: |
        echo "🚀 Retomando/Iniciando motor com DeepSeek-R1-${{ env.MODEL_SIZE }}..."
        # Adiciona o diretório raiz ao PYTHONPATH para que os módulos sejam encontrados
        export PYTHONPATH=$PYTHONPATH:$(pwd):$(pwd)/core
        python core/main.py --auto --cycles ${{ env.GENERATIONS }}

    - name: ⬆️ Salvar Evolução Atualizada
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: atena-brain-${{ env.MODEL_SIZE }}
        path: |
          atena_evolution/knowledge/
          atena_evolution/logs/
        retention-days: 3
        overwrite: true
