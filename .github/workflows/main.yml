name: ATENA-EVO-7B-LITE

on:
  workflow_dispatch:
    inputs:
      generations:
        default: '60'
  schedule:
    - cron: '30 * * * *'

permissions:
  contents: write
  actions: write

jobs:
  run-evolution:
    runs-on: ubuntu-latest
    env:
      LLM_MODEL: "deepseek-ai/DeepSeek-R1-Distill-Qwen-7B"
      PYTHONPATH: "${{ github.workspace }}:${{ github.workspace }}/core"
      # Força o uso de menos memória pelo PyTorch
      MALLOC_CONF: "dirty_decay_ms:0"

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔧 Instalar Deps (com BitsAndBytes para 4-bit)
        run: |
          python -m pip install --upgrade pip
          pip install requests torch transformers accelerate faiss-cpu astor sentence-transformers aiosqlite aiohttp bitsandbytes

      - name: 🧠 Carregar Memória Anterior
        uses: dawidd6/action-download-artifact@v3
        continue-on-error: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          name: atena-brain
          path: atena_evolution/

      - name: 🚀 Executar Evolução (Modo de Baixa Memória)
        run: |
          # Adicionamos flags para o seu script entender que deve carregar de forma leve
          python core/main.py --auto --cycles ${{ github.event.inputs.generations || '60' }} --low-vram --load-4bit

      - name: ⬆️ Salvar Novo Conhecimento
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atena-brain
          path: atena_evolution/
          retention-days: 5
          
