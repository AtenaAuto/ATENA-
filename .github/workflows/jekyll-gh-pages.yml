# .github/workflows/deploy-enhanced.yml
# Deploy Jekyll com ATENA, testes, segurança e monitoramento

name: 🚀 Deploy Atena + Jekyll com CI/CD Avançado

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "_posts/**"
      - "_layouts/**"
      - "_includes/**"
      - "_config.yml"
      - "assets/**"
      - ".github/workflows/deploy-enhanced.yml"
  pull_request:
    branches: ["main"]
  schedule:
    # Executa testes a cada 6 horas
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      enable_atena:
        description: "Ativar evolução ATENA?"
        required: false
        default: "true"
      atena_cycles:
        description: "Ciclos de evolução ATENA"
        required: false
        default: "5"

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write
  issues: write
  checks: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

env:
  RUBY_VERSION: "3.2"
  NODE_VERSION: "18"
  CACHE_VERSION: v1

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # 1. VALIDAÇÃO E ANÁLISE ESTÁTICA
  # ═══════════════════════════════════════════════════════════════════
  validate:
    name: 🔍 Validação e Análise Estática
    runs-on: ubuntu-latest
    outputs:
      build_success: ${{ steps.validate.outputs.success }}
      security_issues: ${{ steps.security.outputs.issues }}
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history para análise

      - name: 💾 Cache Ruby Gems
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          cache-version: ${{ env.CACHE_VERSION }}

      - name: 📋 Validar YAML
        run: |
          echo "🔍 Validando YAML..."
          for file in _config.yml _data/*.yml; do
            if [ -f "$file" ]; then
              ruby -e "require 'yaml'; YAML.load_file('$file')" && echo "✓ $file" || echo "✗ $file"
            fi
          done

      - name: 🔐 Verificar Links (Markdown)
        run: |
          echo "🔗 Verificando links internos..."
          gem install html-proofer
          jekyll build --destination _site
          htmlproofer ./_site --disable-external --allow-hash-href || true

      - name: 📦 Verificar Dependências
        run: |
          echo "📦 Analisando gems..."
          bundle audit --update || true
          bundle list | head -20

      - name: 🛡️ Segurança (SAST)
        id: security
        run: |
          echo "🛡️ Verificando vulnerabilidades..."
          # Busca por padrões perigosos
          ISSUES=$(grep -r "eval\|exec\|system" _posts/ --include="*.md" 2>/dev/null | wc -l)
          echo "issues=$ISSUES" >> $GITHUB_OUTPUT
          
          if [ $ISSUES -gt 0 ]; then
            echo "⚠️ Encontrados $ISSUES padrões potencialmente perigosos"
          fi

      - name: ✅ Validação Concluída
        id: validate
        run: echo "success=true" >> $GITHUB_OUTPUT

  # ═══════════════════════════════════════════════════════════════════
  # 2. TESTES
  # ═══════════════════════════════════════════════════════════════════
  test:
    name: 🧪 Testes Unitários e Integração
    runs-on: ubuntu-latest
    needs: validate
    
    strategy:
      matrix:
        ruby-version: ["3.1", "3.2"]
        jekyll-version: ["4.2", "4.3"]
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: 📋 Info do Sistema
        run: |
          echo "Ruby: $(ruby --version)"
          echo "Bundle: $(bundle --version)"
          echo "Jekyll: $(jekyll --version)"

      - name: 🏗️ Build Jekyll
        id: build
        run: |
          echo "🏗️ Construindo site Jekyll..."
          jekyll build \
            --strict_front_matter \
            --future \
            --drafts \
            --destination _site \
            --verbose
          
          SITE_SIZE=$(du -sh _site | cut -f1)
          PAGES_COUNT=$(find _site -name "*.html" | wc -l)
          
          echo "size=$SITE_SIZE" >> $GITHUB_OUTPUT
          echo "pages=$PAGES_COUNT" >> $GITHUB_OUTPUT

      - name: 📊 Análise de Performance
        run: |
          echo "📊 Performance do Site:"
          echo "  - Tamanho total: ${{ steps.build.outputs.size }}"
          echo "  - Número de páginas: ${{ steps.build.outputs.pages }}"
          
          # Verifica tamanho de assets
          LARGEST=$(find _site -type f -exec ls -lh {} \; | sort -k5 -rh | head -5)
          echo "  - 5 maiores arquivos:"
          echo "$LARGEST" | awk '{print "    " $9 " (" $5 ")"}'

      - name: ✅ Testes Passaram
        run: echo "✓ Build bem-sucedido"

  # ═══════════════════════════════════════════════════════════════════
  # 3. EVOLUÇÃO ATENA (Opcional)
  # ═══════════════════════════════════════════════════════════════════
  atena-evolve:
    name: 🧬 ATENA - Evolução Automática
    runs-on: ubuntu-latest
    needs: [validate, test]
    if: |
      github.event_name == 'push' && 
      github.ref == 'refs/heads/main' &&
      (github.event.inputs.enable_atena == 'true' || true)
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: 📦 Instalar Dependências ATENA
        run: |
          echo "📦 Instalando ATENA e dependências..."
          pip install --upgrade pip
          pip install radon astor numpy requests scikit-learn
          pip install sentence-transformers 2>/dev/null || true
          
          # Verifica arquivo do ATENA
          if [ ! -f "atena_engine.py" ]; then
            echo "⚠️ atena_engine.py não encontrado"
            exit 0
          fi

      - name: 🧬 Executar ATENA - Ciclos de Evolução
        id: atena
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ATENA_CYCLES: ${{ github.event.inputs.atena_cycles || '5' }}
          CI: "true"
          GITHUB_ACTIONS: "true"
        run: |
          echo "🧬 Iniciando ATENA com $ATENA_CYCLES ciclos..."
          
          python atena_engine.py \
            --auto \
            --cycles $ATENA_CYCLES \
            2>&1 | tee atena_output.log
          
          # Extrai melhor score
          BEST_SCORE=$(grep -oP '(?<=Score final: )\d+\.\d+' atena_output.log | tail -1 || echo "0.0")
          GEN=$(grep -oP '(?<=Gerações: )\d+' atena_output.log | tail -1 || echo "0")
          
          echo "best_score=$BEST_SCORE" >> $GITHUB_OUTPUT
          echo "generations=$GEN" >> $GITHUB_OUTPUT

      - name: 💾 Upload ATENA Artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: atena-evolution-log
          path: atena_output.log
          retention-days: 30

      - name: 📈 Comentar PR com Resultado ATENA
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const score = '${{ steps.atena.outputs.best_score }}';
            const gens = '${{ steps.atena.outputs.generations }}';
            
            if (score && score !== '0.0') {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 🧬 ATENA Evolution Results\n\n` +
                      `- **Best Score**: ${score}\n` +
                      `- **Generations**: ${gens}\n` +
                      `- **Status**: ✅ Evolução Concluída\n`
              });
            }

  # ═══════════════════════════════════════════════════════════════════
  # 4. BUILD FINAL
  # ═══════════════════════════════════════════════════════════════════
  build:
    name: 🏗️ Build Otimizado
    runs-on: ubuntu-latest
    needs: [validate, test, atena-evolve]
    if: always() && (needs.validate.outputs.build_success == 'true' || true)
    
    outputs:
      site-url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: 📦 Setup Node.js (para assets)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 🎨 Build Assets
        run: |
          if [ -f "package.json" ]; then
            echo "📦 Instalando dependências npm..."
            npm ci
            npm run build 2>/dev/null || true
          fi

      - name: 🏗️ Build Jekyll (Produção)
        env:
          JEKYLL_ENV: production
        run: |
          echo "🏗️ Build Jekyll em modo produção..."
          jekyll build \
            --strict_front_matter \
            --destination _site
          
          # Minificação opcional
          if command -v html-minifier &> /dev/null; then
            find _site -name "*.html" -exec html-minifier --minify-css --minify-js -o {} {} \;
          fi
          
          # Estatísticas
          echo "✅ Site construído"
          echo "  Tamanho: $(du -sh _site | cut -f1)"
          echo "  Páginas: $(find _site -name "*.html" | wc -l)"

      - name: 📋 Gerar Sitemap (se não existir)
        run: |
          if [ ! -f "_site/sitemap.xml" ]; then
            echo "Gerando sitemap..."
            gem install jekyll-sitemap
            jekyll build --destination _site
          fi

      - name: 📤 Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # ═══════════════════════════════════════════════════════════════════
  # 5. DEPLOY
  # ═══════════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy para GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: 🔑 Setup Pages
        uses: actions/configure-pages@v5

      - name: 📥 Download Artifact
        uses: actions/download-artifact@v3
        with:
          name: github-pages
          path: .

      - name: 🚀 Deploy
        id: deployment
        uses: actions/deploy-pages@v5

      - name: ✅ Deploy Concluído
        run: |
          echo "✅ Site disponível em: ${{ steps.deployment.outputs.page_url }}"

  # ═══════════════════════════════════════════════════════════════════
  # 6. NOTIFICAÇÕES E RELATÓRIOS
  # ═══════════════════════════════════════════════════════════════════
  notify:
    name: 📧 Notificações e Relatórios
    runs-on: ubuntu-latest
    needs: [validate, test, build, deploy]
    if: always()
    
    steps:
      - name: 📊 Determinar Status Final
        id: status
        run: |
          VALIDATE=${{ needs.validate.result }}
          TEST=${{ needs.test.result }}
          BUILD=${{ needs.build.result }}
          DEPLOY=${{ needs.deploy.result }}
          
          if [[ "$VALIDATE" == "success" && "$TEST" == "success" && "$BUILD" == "success" ]]; then
            echo "status=✅ SUCESSO"
            echo "color=0x28a745"
          else
            echo "status=❌ FALHA"
            echo "color=0xdc3545"
          fi

      - name: 💬 Comentar em Issues
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const validate = '${{ needs.validate.result }}';
            const test = '${{ needs.test.result }}';
            const build = '${{ needs.build.result }}';
            
            const body = `
            ## Workflow Summary
            
            | Step | Status |
            |------|--------|
            | Validate | ${validate === 'success' ? '✅' : '❌'} |
            | Test | ${test === 'success' ? '✅' : '❌'} |
            | Build | ${build === 'success' ? '✅' : '❌'} |
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: 📧 Notificar Slack (Opcional)
        if: failure() && secrets.SLACK_WEBHOOK
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "❌ Deploy falhou em ${{ github.repository }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deploy Status*\n${{ steps.status.outputs.status }}"
                  }
                }
              ]
            }

  # ═══════════════════════════════════════════════════════════════════
  # 7. CLEANUP (Limpeza de recursos antigos)
  # ═══════════════════════════════════════════════════════════════════
  cleanup:
    name: 🧹 Cleanup
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: 🧹 Remover Artifacts Antigos
        uses: geekyeggo/delete-artifact@v2
        with:
          name: "*"
          failOnError: false
