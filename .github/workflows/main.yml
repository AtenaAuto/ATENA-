name: 🧬 ATENA Ω - Evolução Divina v4.2 (DeepSeek-R1 Edition)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      model_size:
        description: 'Tamanho do modelo'
        required: true
        default: '1.5B'
        type: choice
        options: ['1.5B', '7B']
      generations:
        description: 'Gerações'
        required: true
        default: '30'
        type: choice
        options: ['30', '600', '2500']

permissions:
  contents: write
  actions: write

jobs:
  evoluir:
    name: 🧠 Evolução Neural
    runs-on: ubuntu-latest
    timeout-minutes: 25
    
    env:
      MODEL_SIZE: ${{ github.event.inputs.model_size || '1.5B' }}
      GENERATIONS: ${{ github.event.inputs.generations || '30' }}

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 🔧 Instalar dependências
      run: |
        python -m pip install --upgrade pip
        python -m pip install requests torch transformers accelerate faiss-cpu astor sentence-transformers aiosqlite aiohttp

    - name: 📂 Preparar Estrutura
      run: |
        mkdir -p atena_evolution/code atena_evolution/knowledge atena_evolution/logs
        if [ -d modules ]; then cp -r modules core/ || true; fi

    - name: 🧠 Baixar Evolução Anterior
      uses: dawidd6/action-download-artifact@v3
      continue-on-error: true
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        name: atena-brain-${{ env.MODEL_SIZE }}
        path: atena_evolution/
        if_no_artifact_found: warn

    - name: 🔮 Executar ATENA Core
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd):$(pwd)/core
        python core/main.py --auto --cycles ${{ env.GENERATIONS }}

    - name: ⬆️ Salvar Evolução
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: atena-brain-${{ env.MODEL_SIZE }}
        path: |
          atena_evolution/knowledge/
          atena_evolution/logs/
        retention-days: 3
        overwrite: true
        
