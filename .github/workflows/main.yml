name: ATENA-EVO-STABLE

on:
  workflow_dispatch:
    inputs:
      generations:
        default: '100'
  schedule:
    - cron: '30 * * * *'

permissions:
  contents: write
  actions: write

jobs:
  run-evolution:
    runs-on: ubuntu-latest
    env:
      # O 1.5B roda liso nos 7GB de RAM do GitHub
      LLM_MODEL: "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"
      PYTHONPATH: "${{ github.workspace }}:${{ github.workspace }}/core"

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔧 Instalar Deps
        run: |
          python -m pip install --upgrade pip
          pip install requests torch transformers accelerate faiss-cpu astor sentence-transformers aiosqlite aiohttp

      - name: 🧠 Carregar Memória
        uses: dawidd6/action-download-artifact@v3
        continue-on-error: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          name: atena-brain
          path: atena_evolution/

      - name: 🚀 Executar Evolução (Foco em Estabilidade)
        run: |
          # Aumentei para 100 ciclos já que o modelo é mais leve
          python core/main.py --auto --cycles ${{ github.event.inputs.generations || '100' }}

      - name: ⬆️ Salvar Conhecimento
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atena-brain
          path: atena_evolution/
          retention-days: 5
          
