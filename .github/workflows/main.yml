name: 🧬 ATENA Ω - Evolução Divina v40.3 Genesis

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      generations:
        description: 'Número de gerações'
        required: true
        default: '30'
        type: choice
        options: ['3', '5', '10', '20', '50']

permissions:
  contents: write
  actions: write

concurrency:
  group: atena-evolution
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Garante que o Python enxergue a RAIZ e a pasta MODULES
  PYTHONPATH: "${{ github.workspace }}:${{ github.workspace }}/modules"
  # Mapeamento explícito das suas Secrets (Imagem 1000008312.png)
  XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
  NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  ATENA_LM_ENABLED: "true"

jobs:
  evoluir:
    name: 🧠 Evolução Neural + DNA Assimilation
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 🟢 Setup Node.js v24
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: 📦 Instalar Dependências Core
      run: |
        python -m pip install --upgrade pip
        pip install astor radon requests numpy scikit-learn psutil aiosqlite beautifulsoup4 huggingface_hub
        npm install -g tsx typescript

    - name: 🧠 Instalar IA Local (Torch & Faiss)
      if: env.ATENA_LM_ENABLED == 'true'
      run: |
        # Instalando separadamente para evitar o erro da Imagem 1000008317.png
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install faiss-cpu

    - name: 🧹 Limpeza de Caracteres (Fix Syntax Error)
      run: |
        # Remove o caractere U+2500 e outros que travam o services.py (Imagem 1000008310.png)
        find . -name "*.py" -exec sed -i 's/[^\x00-\x7F]//g' {} +

    - name: 🧠 Restaurar Memória (Artifacts)
      run: |
        ARTIFACT_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=5" \
          --jq '.artifacts | map(select(.name | startswith("atena-brain-"))) | sort_by(.created_at) | reverse | .[0].id' 2>/dev/null || echo "")
        if [ -n "$ARTIFACT_ID" ] && [ "$ARTIFACT_ID" != "null" ]; then
          gh api "repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip" > brain.zip
          unzip -q -o brain.zip -d . && rm brain.zip
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    - name: 🔮 Executar ATENA Core
      run: |
        # Roda o main.py com as variáveis de ambiente carregadas
        python main.py --auto --cycles ${{ github.event.inputs.generations || '10' }} --deep

    - name: 💾 Salvar Evolução
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: atena-brain-${{ github.run_id }}
        path: |
          atena_evolution/knowledge/
          atena_evolution/lm/model/
          atena_evolution/reference_dna/
        retention-days: 7

    - name: ✅ Finalização
      if: always()
      run: echo "Ciclo concluído."
