name: 🧬 ATENA Ω - Evolução Divina v3.3

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      generations:
        description: 'Número de gerações'
        required: true
        default: '30'
        type: choice
        options:
          - '3'
          - '5'
          - '10'
          - '20'
          - '50'
      mode:
        description: 'Modo de evolução'
        required: true
        default: 'auto'
        type: choice
        options:
          - 'auto'
          - 'recon'
          - 'nocode'
      recon_topic:
        description: 'Tópico para Hacker Recon (se mode=recon)'
        required: false
        default: 'advanced python optimization'
      nocode_desc:
        description: 'Descrição do projeto No-Code (se mode=nocode)'
        required: false
        default: 'a simple flask web app with sqlite'
      deep_self_mod:
        description: 'Permite que a Atena modifique o próprio engine (⚠️ cuidado!)'
        required: false
        default: true
        type: boolean
      checker_evolve:
        description: 'Permite que o AdaptiveChecker evolua suas regras'
        required: false
        default: true
        type: boolean
      lm_enabled:
        description: 'Ativa o modelo de linguagem local (AtenaLocalLM)'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  actions: write

concurrency:
  group: atena-evolution
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  GENERATIONS: ${{ github.event.inputs.generations || '10' }}
  MODE: ${{ github.event.inputs.mode || 'auto' }}
  RECON_TOPIC: ${{ github.event.inputs.recon_topic || 'advanced python optimization' }}
  NOCODE_DESC: ${{ github.event.inputs.nocode_desc || 'a simple flask web app with sqlite' }}

  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
  XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
  NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}

  DEPLOY_GIT_REPO: ${{ secrets.DEPLOY_GIT_REPO }}
  DEPLOY_DOCKER_IMAGE: ${{ secrets.DEPLOY_DOCKER_IMAGE }}
  DEPLOY_COMMAND: ${{ secrets.DEPLOY_COMMAND }}

  ALLOW_WORKFLOW_MUTATION: 'true'
  LT_INTERVAL: '1'
  LT_VERBOSE: 'false'
  GROK_LT_INTERVAL: '5'
  VH_INTERVAL_HOURS: '6'
  DASHBOARD_PORT: '7331'

  ALLOW_DEEP_SELF_MOD: ${{ github.event.inputs.deep_self_mod == 'true' && 'true' || 'false' }}
  ALLOW_CHECKER_EVOLVE: ${{ github.event.inputs.checker_evolve == 'true' && 'true' || 'false' }}
  SELF_MOD_INTERVAL: '10'
  RECURSIVE_CYCLES: '3'
  MAX_ENGINE_MUTATIONS: '3'

  ATENA_LM_ENABLED: ${{ github.event.inputs.lm_enabled != 'false' && 'true' || 'false' }}
  ATENA_LM_TRAIN_EVERY: '5'
  ATENA_LM_EMBED_DIM: '128'
  ATENA_LM_LAYERS: '4'
  ATENA_LM_MIN_SAMPLES: '5'

  MIN_IMPROVEMENT_DELTA: '0.001'
  CANDIDATES_PER_CYCLE: '6'
  PARALLEL_WORKERS: '4'
  TRAINING_INTERVAL: '900'

  PYTHONFAULTHANDLER: '1'
  PYTHONUNBUFFERED: '1'

jobs:
  evoluir:
    name: 🧠 Evolução Neural v3.3 + LocalLM + Atuadores
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: ⚡ Banner
      run: |
        echo "╔═══════════════════════════════════════════════════════╗"
        echo "║     ATENA Ω - EVOLUÇÃO DIVINA v3.3 + LocalLM          ║"
        echo "║     Grok corrigido · Memória persistente melhorada     ║"
        echo "║     Atuadores habilitados                             ║"
        echo "╚═══════════════════════════════════════════════════════╝"
        echo "📅 Data: $(date)"
        echo "🎯 Modo: ${{ env.MODE }}"
        echo "🎯 Gerações: ${{ env.GENERATIONS }}"
        echo "🔧 Deep self-mod: ${{ env.ALLOW_DEEP_SELF_MOD }}"
        echo "🔧 Checker evolve: ${{ env.ALLOW_CHECKER_EVOLVE }}"
        echo "🧠 AtenaLocalLM: ${{ env.ATENA_LM_ENABLED }}"
        echo "🔑 XAI_API_KEY: ${{ secrets.XAI_API_KEY != '' && 'sim ✅' || 'não ⚠️' }}"
        echo "🔑 GH_TOKEN: ${{ secrets.GH_TOKEN != '' && 'sim ✅' || 'não ⚠️' }}"
        echo "🔑 HF_TOKEN: ${{ secrets.HF_TOKEN != '' && 'sim ✅' || 'não ⚠️' }}"
        echo "⚙️ MIN_IMPROVEMENT_DELTA: ${{ env.MIN_IMPROVEMENT_DELTA }}"
        echo "⚙️ CANDIDATES_PER_CYCLE: ${{ env.CANDIDATES_PER_CYCLE }}"

    - name: 📥 Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 📦 Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-atena-${{ hashFiles('**/requirements*.txt') }}-v3.4
        restore-keys: |
          ${{ runner.os }}-pip-atena-

    - name: 🧠 Cache modelo AtenaLocalLM
      uses: actions/cache@v4
      with:
        path: |
          atena_evolution/lm/model/
          atena_evolution/lm/vocab.json
          atena_evolution/lm/ngram.pkl
          atena_evolution/lm/data/
        key: atena-lm-model-${{ hashFiles('atena_evolution/lm/model/**', 'atena_evolution/lm/vocab.json') }}
        restore-keys: |
          atena-lm-model-

    - name: 🔧 Instalar dependências de sistema
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y python3-dev build-essential sqlite3 jq tesseract-ocr

    - name: 📦 Instalar dependências Python
      run: |
        python -m pip install --upgrade pip
        python install.py

    - name: 🧪 Executar testes rápidos
      run: python quick_test.py

    - name: 🔍 Verificar importação de main.py
      run: python -c "import main; print('main.py importado com sucesso')"

    - name: 📂 Criar diretórios de memória
      run: |
        mkdir -p atena_evolution/code \
                 atena_evolution/backups \
                 atena_evolution/backups/selfmod \
                 atena_evolution/knowledge \
                 atena_evolution/sandbox \
                 atena_evolution/models \
                 atena_evolution/deploy \
                 atena_evolution/projects \
                 atena_evolution/lm/model \
                 atena_evolution/lm/checkpoints \
                 atena_evolution/lm/data \
                 atena_evolution/logs

    - name: 🧠 Restaurar memória do run anterior
      run: |
        echo "Tentando restaurar brain data do run anterior..."
        ARTIFACT_ID=$(gh api \
          "repos/${{ github.repository }}/actions/artifacts?per_page=30" \
          --jq '.artifacts | map(select(.name | startswith("atena-brain-data-"))) | sort_by(.created_at) | reverse | .[0].id' \
          2>/dev/null || echo "")

        if [ -n "$ARTIFACT_ID" ] && [ "$ARTIFACT_ID" != "null" ]; then
          echo "Encontrado artifact ID: $ARTIFACT_ID — baixando..."
          gh api "repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip" > brain.zip 2>/dev/null

          if [ -s brain.zip ]; then
            unzip -q -o brain.zip -d . && rm brain.zip && \
              echo "✅ Extração concluída" || \
              echo "⚠️ Falha ao extrair"

            echo "📦 Procurando knowledge.db após restore:"
            find . -name "knowledge.db" 2>/dev/null | head -10

            if [ ! -f "atena_evolution/knowledge/knowledge.db" ]; then
              FOUND=$(find . -name "knowledge.db" -not -path "*/\.*" 2>/dev/null | head -1)
              if [ -n "$FOUND" ]; then
                echo "🔧 Copiando banco de '$FOUND' para o lugar correto..."
                cp "$FOUND" atena_evolution/knowledge/knowledge.db
                echo "✅ Banco reposicionado com sucesso"
              else
                echo "⚠️ Banco não encontrado no artifact"
              fi
            else
              echo "✅ Banco encontrado no lugar correto"
            fi
          else
            echo "⚠️ Artifact vazio ou falha no download"
            rm -f brain.zip
          fi
        else
          echo "ℹ️ Nenhum artifact anterior — primeira execução"
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    - name: 🔍 Verificar banco de conhecimento restaurado
      run: |
        DB="atena_evolution/knowledge/knowledge.db"

        echo "📂 Arquivos .db encontrados:"
        find atena_evolution/ -name "*.db" 2>/dev/null || echo "  nenhum"

        if [ -f "$DB" ]; then
          FUNC_COUNT=$(sqlite3 "$DB" "SELECT COUNT(*) FROM learned_functions;" 2>/dev/null || echo "0")
          GEN_COUNT=$(sqlite3 "$DB" "SELECT COUNT(*) FROM evolution_metrics;" 2>/dev/null || echo "0")
          SCORE=$(sqlite3 "$DB" "SELECT MAX(new_score) FROM evolution_metrics;" 2>/dev/null || echo "0")
          echo "✅ Banco restaurado com sucesso!"
          echo "   📚 Funções aprendidas   : $FUNC_COUNT"
          echo "   🧬 Evoluções registradas: $GEN_COUNT"
          echo "   🏆 Melhor score histórico: $SCORE"
          echo "RESTORED_BEST_SCORE=$SCORE" >> $GITHUB_ENV
        else
          echo "ℹ️ Banco não encontrado — começando do zero"
          echo "RESTORED_BEST_SCORE=0" >> $GITHUB_ENV
        fi

    - name: 🔄 Rotação automática de tópicos para Hacker Recon
      id: rotate_topic
      run: |
        TOPICS=(
          "python evolutionary algorithm metaheuristic"
          "python genetic programming code generation"
          "python reinforcement learning q-learning"
          "python neural network from scratch"
          "python self-modifying code metaprogramming"
          "python code optimization performance"
          "python metaheuristics simulated annealing"
          "python swarm intelligence particle swarm"
          "python deep learning tiny transformer"
          "python automatic code refactoring"
          "python graph algorithms dijkstra"
          "python machine learning basics"
          "python symbolic computation"
          "python constraint satisfaction problem"
          "python automata theory implementation"
          "python probabilistic programming"
          "python bayesian inference"
          "python fuzzy logic system"
          "python expert system rule engine"
          "python evolutionary strategy"
        )

        STATE_FILE="atena_evolution/recon_rotation_state.txt"

        MODE="${{ env.MODE }}"
        if [ "$MODE" != "recon" ] && [ "$MODE" != "auto" ]; then
          echo "Modo $MODE não usa rotação de tópicos."
          exit 0
        fi

        if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.recon_topic }}" ]; then
          echo "Usando tópico fornecido manualmente: ${{ env.RECON_TOPIC }}"
          echo "recon_topic=${{ env.RECON_TOPIC }}" >> $GITHUB_OUTPUT
          exit 0
        fi

        if [ -f "$STATE_FILE" ]; then
          CURRENT_INDEX=$(cat "$STATE_FILE")
        else
          CURRENT_INDEX=0
        fi

        NEXT_INDEX=$(( (CURRENT_INDEX + 1) % ${#TOPICS[@]} ))
        SELECTED_TOPIC="${TOPICS[$NEXT_INDEX]}"

        echo "🔄 Rotação: tópico anterior índice $CURRENT_INDEX, próximo $NEXT_INDEX"
        echo "📡 Tópico selecionado: $SELECTED_TOPIC"

        echo "$NEXT_INDEX" > "$STATE_FILE"

        echo "recon_topic=$SELECTED_TOPIC" >> $GITHUB_OUTPUT
        echo "RECON_TOPIC=$SELECTED_TOPIC" >> $GITHUB_ENV

      continue-on-error: true

    - name: 🔎 Verificar arquivos necessários
      run: |
        echo "📋 Arquivos no repositório:"
        ls -la

        if [ ! -f "main.py" ]; then
          echo "❌ ERRO: main.py não encontrado!"
          exit 1
        fi

        if [ "${{ env.ATENA_LM_ENABLED }}" == "true" ]; then
          if [ ! -f "atena_local_lm.py" ]; then
            echo "⚠️ atena_local_lm.py não encontrado"
            echo "ATENA_LM_ENABLED=false" >> $GITHUB_ENV
          else
            echo "✅ atena_local_lm.py encontrado"
          fi
        fi

        python -c "import torch; print(f'✅ PyTorch {torch.__version__} disponível')" 2>/dev/null || \
          echo "ℹ️ PyTorch não disponível — usará n-grama"

        python -c "import psutil; print(f'✅ psutil {psutil.__version__} disponível')" 2>/dev/null || \
          echo "⚠️ psutil não instalado — AtenaSysAware não funcionará"

        if [ -n "$XAI_API_KEY" ]; then
          echo "✅ XAI_API_KEY configurada (Grok ativo)"
        else
          echo "⚠️ XAI_API_KEY não configurada"
        fi

    - name: 🔮 Executar ATENA Core v3.3
      id: execucao
      run: |
        echo "🚀 Iniciando motor de evolução v3.3..."
        echo "📊 Score restaurado: ${{ env.RESTORED_BEST_SCORE }}"

        EXTRA_ARGS=""
        if [ "${{ env.ALLOW_DEEP_SELF_MOD }}" == "true" ]; then
          EXTRA_ARGS="$EXTRA_ARGS --deep"
        fi
        if [ "${{ env.ALLOW_CHECKER_EVOLVE }}" == "true" ]; then
          EXTRA_ARGS="$EXTRA_ARGS --checker"
        fi

        export ATENA_LM_ENABLED="${{ env.ATENA_LM_ENABLED }}"
        export ATENA_LM_TRAIN_EVERY="${{ env.ATENA_LM_TRAIN_EVERY }}"
        export ATENA_LM_EMBED_DIM="${{ env.ATENA_LM_EMBED_DIM }}"
        export ATENA_LM_LAYERS="${{ env.ATENA_LM_LAYERS }}"
        export ATENA_LM_MIN_SAMPLES="${{ env.ATENA_LM_MIN_SAMPLES }}"

        export MIN_IMPROVEMENT_DELTA="${{ env.MIN_IMPROVEMENT_DELTA }}"
        export CANDIDATES_PER_CYCLE="${{ env.CANDIDATES_PER_CYCLE }}"
        export PARALLEL_WORKERS="${{ env.PARALLEL_WORKERS }}"
        export TRAINING_INTERVAL="${{ env.TRAINING_INTERVAL }}"

        if [ "${{ steps.rotate_topic.outputs.recon_topic }}" != "" ]; then
          RECON_TOPIC="${{ steps.rotate_topic.outputs.recon_topic }}"
        else
          RECON_TOPIC="${{ env.RECON_TOPIC }}"
        fi

        set +e
        if [ "${{ env.MODE }}" == "recon" ]; then
          python main.py --recon "$RECON_TOPIC" $EXTRA_ARGS
        elif [ "${{ env.MODE }}" == "nocode" ]; then
          python main.py --nocode --desc "${{ env.NOCODE_DESC }}" $EXTRA_ARGS
        else
          python main.py --auto --cycles ${{ env.GENERATIONS }} $EXTRA_ARGS
        fi
        EXIT_CODE=$?
        set -e

        if [ $EXIT_CODE -ne 0 ]; then
          echo "⚠️ Processo terminou com código $EXIT_CODE"
        else
          echo "✅ Processamento concluído com sucesso"
        fi
        echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

    - name: 🔍 Verificar integridade do banco
      if: always()
      run: |
        if [ -f atena_evolution/knowledge/knowledge.db ]; then
          echo "🔎 Verificando integridade SQLite..."
          sqlite3 atena_evolution/knowledge/knowledge.db "PRAGMA integrity_check;" > integrity.txt 2>&1
          if grep -q "ok" integrity.txt; then
            echo "✅ Banco íntegro"
            FUNC_FINAL=$(sqlite3 atena_evolution/knowledge/knowledge.db \
              "SELECT COUNT(*) FROM learned_functions;" 2>/dev/null || echo "?")
            GEN_FINAL=$(sqlite3 atena_evolution/knowledge/knowledge.db \
              "SELECT COUNT(*) FROM evolution_metrics;" 2>/dev/null || echo "?")
            echo "📊 Estado final: $FUNC_FINAL funções | $GEN_FINAL evoluções"
          else
            echo "⚠️ Banco corrompido"
            cp atena_evolution/knowledge/knowledge.db \
               atena_evolution/knowledge/knowledge.db.corrupted
            cat integrity.txt
          fi
        else
          echo "ℹ️ Banco não encontrado"
        fi

    - name: 📊 Gerar Relatório de Inteligência v3.3
      if: always()
      run: |
        echo "# 🧬 Relatório de Ciclo ATENA Ω v3.3" > relatorio.md
        echo "- **Data:** $(date)" >> relatorio.md
        echo "- **Run ID:** ${{ github.run_id }}" >> relatorio.md
        echo "- **Modo:** ${{ env.MODE }}" >> relatorio.md
        echo "- **Gerações:** ${{ env.GENERATIONS }}" >> relatorio.md
        echo "- **Deep self-mod:** ${{ env.ALLOW_DEEP_SELF_MOD }}" >> relatorio.md
        echo "- **Checker evolve:** ${{ env.ALLOW_CHECKER_EVOLVE }}" >> relatorio.md
        echo "- **AtenaLocalLM:** ${{ env.ATENA_LM_ENABLED }}" >> relatorio.md
        echo "- **Tópico Recon:** ${{ env.RECON_TOPIC }}" >> relatorio.md
        echo "- **NOCODE Desc:** ${{ env.NOCODE_DESC }}" >> relatorio.md
        echo "- **Score Restaurado:** ${{ env.RESTORED_BEST_SCORE }}" >> relatorio.md
        echo "- **Status da Execução:** ${{ steps.execucao.outcome }}" >> relatorio.md
        echo "- **Código de Saída:** ${{ steps.execucao.outputs.exit_code }}" >> relatorio.md
        echo "" >> relatorio.md

        if [ -f atena_evolution/knowledge/knowledge.db ]; then
          echo "## 📚 Sumário do Banco de Conhecimento" >> relatorio.md
          echo "- **Funções Aprendidas:** $(sqlite3 atena_evolution/knowledge/knowledge.db "SELECT COUNT(*) FROM learned_functions;" 2>/dev/null || echo "?")" >> relatorio.md
          echo "- **Evoluções Registradas:** $(sqlite3 atena_evolution/knowledge/knowledge.db "SELECT COUNT(*) FROM evolution_metrics;" 2>/dev/null || echo "?")" >> relatorio.md
          echo "- **Melhor Score Histórico:** $(sqlite3 atena_evolution/knowledge/knowledge.db "SELECT MAX(new_score) FROM evolution_metrics;" 2>/dev/null || echo "?")" >> relatorio.md
          echo "" >> relatorio.md
        fi

        echo "## ⚙️ Variáveis de Ambiente e Configurações Chave" >> relatorio.md
        echo "```yaml" >> relatorio.md
        env | grep -E '^(PYTHON_VERSION|GENERATIONS|MODE|RECON_TOPIC|NOCODE_DESC|ALLOW_DEEP_SELF_MOD|ALLOW_CHECKER_EVOLVE|ATENA_LM_ENABLED|MIN_IMPROVEMENT_DELTA|CANDIDATES_PER_CYCLE|PARALLEL_WORKERS|TRAINING_INTERVAL)' >> relatorio.md
        echo "```" >> relatorio.md
        echo "" >> relatorio.md

        echo "## 📋 Logs Recentes" >> relatorio.md
        echo "```" >> relatorio.md
        tail -n 100 atena_evolution/logs/atena.log 2>/dev/null || echo "Nenhum log disponível."
        echo "```" >> relatorio.md
        echo "" >> relatorio.md

        echo "## 📈 Métricas de Evolução (Últimas 10)" >> relatorio.md
        echo "```" >> relatorio.md
        sqlite3 atena_evolution/knowledge/knowledge.db "SELECT timestamp, generation, new_score, mutation FROM evolution_metrics ORDER BY timestamp DESC LIMIT 10;" 2>/dev/null || echo "Nenhuma métrica disponível."
        echo "```" >> relatorio.md
        echo "" >> relatorio.md

        echo "--- " >> relatorio.md
        echo "*Gerado automaticamente pela Atena Ω CI/CD em ${{ github.event.repository.html_url }}/actions/runs/${{ github.run_id }}*" >> relatorio.md

    - name: ⬆️ Upload Relatório de Inteligência
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: atena-intelligence-report-${{ github.run_id }}
        path: relatorio.md

    - name: ⬆️ Upload Brain Data (DBs e Modelos)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: atena-brain-data-${{ github.run_id }}
        path: |
          atena_evolution/knowledge/knowledge.db
          atena_evolution/models/
          atena_evolution/lm/model/
          atena_evolution/lm/vocab.json
          atena_evolution/lm/ngram.pkl
          atena_evolution/lm/data/
        retention-days: 7

    - name: 🔔 Notificar Sucesso/Falha
      if: always()
      uses: rjstone/discord-webhook-notify@v1
      with:
        severity: ${{ job.status }}
        description: "Atena Ω CI/CD Run #${{ github.run_number }} - ${{ job.status }}"
        webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
        details: "[Ver Workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

