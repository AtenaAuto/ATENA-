name: 🚦 ATENA Production Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  production_gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🔧 Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f setup/requirements.txt ]; then
            python -m pip install -r setup/requirements.txt
          fi

      - name: ✅ Run production gate
        run: |
          chmod +x atena
          ./atena production-ready
