name: 🧬 ATENA Ω - Singularity v43.1

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      generations:
        description: 'Número de gerações'
        default: '30'
        type: choice
        options: ['3', '10', '30', '50']
      use_ultimate:
        description: 'Usar motor ULTIMATE (LLM + RAG híbrido)'
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONPATH: "${{ github.workspace }}:${{ github.workspace }}/modules"
  XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
  NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  ATENA_MAX_RUNTIME: "300"
  # Ativa o motor ultramoderno se solicitado (boolean -> string)
  ATENA_USE_ULTIMATE: ${{ github.event.inputs.use_ultimate == 'true' && 'true' || 'false' }}
  # Otimizações de performance
  OMP_NUM_THREADS: "2"
  MKL_NUM_THREADS: "2"
  # Evita baixar modelos grandes desnecessariamente se não for ultimate
  TRANSFORMERS_OFFLINE: ${{ github.event.inputs.use_ultimate == 'true' && '0' || '1' }}

jobs:
  evoluir:
    runs-on: ubuntu-latest
    timeout-minutes: 25   # Aumentado para comportar LLM e download de modelos
    steps:
    - name: 📥 Checkout do código
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GH_TOKEN }}

    # --------------------------------------------------------------------------
    # CACHE DE DEPENDÊNCIAS (Python + Node + Modelos HF)
    # --------------------------------------------------------------------------
    - name: 🐍 Setup Python com cache de dependências
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          requirements-ultimate.txt
          pyproject.toml

    - name: 📦 Setup Node.js (sem lock file)
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: 💾 Cache dos modelos Hugging Face (apenas se ultimate)
      if: env.ATENA_USE_ULTIMATE == 'true'
      uses: actions/cache@v4
      id: cache-hf
      with:
        path: ~/.cache/huggingface
        key: ${{ runner.os }}-hf-ultimate-${{ hashFiles('atena_ultimate.py', 'requirements-ultimate.txt') }}
        restore-keys: |
          ${{ runner.os }}-hf-ultimate-

    - name: 🔧 Configurar identidade do Git
      run: |
        git config --global user.name "ATENA Ω"
        git config --global user.email "atena@evolution.ai"

    - name: 📦 Instalação de dependências base
      run: |
        python -m pip install --upgrade pip
        pip install astor radon requests numpy scikit-learn psutil aiosqlite beautifulsoup4 huggingface_hub faiss-cpu
        npm install -g tsx typescript

    - name: 📦 Instalação de dependências do motor ULTIMATE (condicional)
      if: env.ATENA_USE_ULTIMATE == 'true'
      run: |
        # Instala torch com suporte a CPU (mais leve para CI)
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install transformers peft bitsandbytes sentence-transformers rank-bm25 codebleu nltk mlflow wandb optuna redis
        # Verifica instalação
        python -c "import torch; print(f'PyTorch version: {torch.__version__}')"

    - name: 📝 Criar arquivo de requirements-ultimate.txt (se não existir)
      run: |
        if [ ! -f requirements-ultimate.txt ] && [ "${{ env.ATENA_USE_ULTIMATE }}" = "true" ]; then
          echo "torch" > requirements-ultimate.txt
          echo "transformers" >> requirements-ultimate.txt
          echo "peft" >> requirements-ultimate.txt
          echo "sentence-transformers" >> requirements-ultimate.txt
          echo "rank-bm25" >> requirements-ultimate.txt
          echo "codebleu" >> requirements-ultimate.txt
          echo "nltk" >> requirements-ultimate.txt
          echo "mlflow" >> requirements-ultimate.txt
          echo "wandb" >> requirements-ultimate.txt
          echo "optuna" >> requirements-ultimate.txt
          echo "redis" >> requirements-ultimate.txt
        fi

    # --------------------------------------------------------------------------
    # SANITIZAÇÃO E VALIDAÇÃO ESTÁTICA
    # --------------------------------------------------------------------------
    - name: 🧹 Sanitização avançada do código
      run: |
        find . -name "*.py" -exec sed -i 's/[^\x00-\x7F]//g' {} \;
        sudo apt-get update && sudo apt-get install -y dos2unix shellcheck || true
        find . -name "*.py" -exec dos2unix {} \; 2>/dev/null || true

    - name: 🔍 Lint e validação de sintaxe
      run: |
        python -m py_compile main.py atena_ultimate.py atena_engine.py 2>/dev/null || true
        pip install flake8 && flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

    - name: 🩺 Diagnóstico de ambiente
      run: |
        echo "🐍 Python version: $(python --version)"
        echo "📦 Pip packages (base):"
        pip list | grep -E "torch|transformers|sentence|faiss|radon|astor" || true
        if [ "${{ env.ATENA_USE_ULTIMATE }}" = "true" ]; then
          echo "🚀 Ultimate packages:"
          pip list | grep -E "peft|bitsandbytes|codebleu|mlflow|wandb|optuna" || true
        fi

    # --------------------------------------------------------------------------
    # RESTAURAÇÃO DE MEMÓRIA (Checkpoint + Artefatos)
    # --------------------------------------------------------------------------
    - name: 🧠 Restauração do último checkpoint
      uses: actions/download-artifact@v4
      with:
        name: atena-brain-latest
        path: atena_evolution/
      continue-on-error: true

    - name: 🧠 Restauração da memória (artefato mais recente - fallback)
      run: |
        if [ ! -d "atena_evolution/knowledge" ]; then
          ARTIFACT_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=1" \
            --jq '.artifacts[0].id' 2>/dev/null || echo "")
          if [ -n "$ARTIFACT_ID" ]; then
            gh api "repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip" > brain.zip
            unzip -q -o brain.zip -d . && rm brain.zip
            echo "✅ Memória restaurada do artefato ${ARTIFACT_ID}"
          else
            echo "ℹ️ Nenhum artefato anterior encontrado, iniciando do zero."
          fi
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    # --------------------------------------------------------------------------
    # EXECUÇÃO PRINCIPAL (com fallback automático)
    # --------------------------------------------------------------------------
    - name: 🔮 Execução da ATENA (tentativa com motor ultimate se ativado)
      id: run_atena
      run: |
        # Verifica se o motor ultimate deve ser usado e se o arquivo existe
        if [ "${{ env.ATENA_USE_ULTIMATE }}" = "true" ] && [ -f "atena_ultimate.py" ]; then
          echo "🚀 Usando motor ULTIMATE (LLM + RAG híbrido)"
          export ATENA_USE_ULTIMATE=true
        else
          echo "⚙️ Usando motor clássico"
          export ATENA_USE_ULTIMATE=false
        fi
        python main.py --auto --cycles ${{ github.event.inputs.generations || '10' }} --deep
      env:
        XAI_API_KEY: ${{ secrets.XAI_API_KEY || '' }}
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY || '' }}
        HF_TOKEN: ${{ secrets.HF_TOKEN || '' }}
        LOG_LEVEL: "INFO"
        # Força o uso de CPU para evitar problemas de CUDA
        CUDA_VISIBLE_DEVICES: ""

    - name: 🔄 Fallback para motor clássico (em caso de falha do ultimate)
      if: failure() && env.ATENA_USE_ULTIMATE == 'true'
      run: |
        echo "⚠️ Motor ultimate falhou. Tentando com motor clássico..."
        export ATENA_USE_ULTIMATE=false
        python main.py --auto --cycles ${{ github.event.inputs.generations || '10' }} --deep
      env:
        XAI_API_KEY: ${{ secrets.XAI_API_KEY || '' }}
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY || '' }}
        HF_TOKEN: ${{ secrets.HF_TOKEN || '' }}
        LOG_LEVEL: "INFO"

    # --------------------------------------------------------------------------
    # PÓS-PROCESSAMENTO: COMMIT, BACKUP, MÉTRICAS
    # --------------------------------------------------------------------------
    - name: 📤 Commit das mutações (evolução do DNA)
      if: always()
      run: |
        git add .
        if ! git diff --cached --quiet; then
          git commit -m "🧬 Ciclo evolutivo: ${{ github.run_id }} [Auto-modificação]"
          git push origin main
        else
          echo "✅ Nenhuma mutação estrutural detectada neste ciclo."
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

    - name: 💾 Backup para Hugging Face (memória externa)
      if: env.HF_TOKEN != ''
      run: |
        python -c "
        from huggingface_hub import HfApi
        api = HfApi()
        api.upload_folder(
            folder_path='atena_evolution/knowledge',
            repo_id='${{ github.repository_owner }}/atena-memory',
            token='${{ env.HF_TOKEN }}',
            repo_type='dataset'
        )
        print('✅ Backup enviado para o Hugging Face Dataset')
        "
      continue-on-error: true

    - name: 📊 Relatório de métricas (sumário + JSON)
      run: |
        echo "## 📈 Métricas da Evolução" >> $GITHUB_STEP_SUMMARY
        echo "- Run ID: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
        echo -n "- Data: " >> $GITHUB_STEP_SUMMARY && date >> $GITHUB_STEP_SUMMARY
        echo "- Gerações solicitadas: ${{ github.event.inputs.generations || '10' }}" >> $GITHUB_STEP_SUMMARY
        echo "- Motor: ${{ env.ATENA_USE_ULTIMATE == 'true' && 'ULTIMATE (LLM+RAG)' || 'Clássico' }}" >> $GITHUB_STEP_SUMMARY
        if [ -f "atena_evolution/logs/latest_metrics.json" ]; then
          echo "### 📊 Últimas métricas" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat atena_evolution/logs/latest_metrics.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi

    - name: 💾 Persistência total do estado (artefato)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: atena-brain-${{ github.run_id }}
        path: |
          atena_evolution/
        retention-days: 7

    - name: 🏷️ Atualizar artefato "latest" (para restauração rápida)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: atena-brain-latest
        path: |
          atena_evolution/
        retention-days: 7

    # --------------------------------------------------------------------------
    # NOTIFICAÇÕES (opcionais)
    # --------------------------------------------------------------------------
    # - name: 📢 Notificar sucesso no Discord/Slack
    #   if: success()
    #   uses: rtCamp/action-slack-notify@v2
    #   env:
    #     SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
    #     SLACK_MESSAGE: "✅ Ciclo ATENA concluído com sucesso! Geração ${{ github.run_id }}"
    #
    # - name: 🚨 Notificar falha
    #   if: failure()
    #   uses: rtCamp/action-slack-notify@v2
    #   env:
    #     SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
    #     SLACK_MESSAGE: "❌ Falha no ciclo ATENA! Veja os logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

    # --------------------------------------------------------------------------
    # LIMPEZA DE CACHES ANTIGAS (opcional)
    # --------------------------------------------------------------------------
    - name: 🧹 Limpeza de caches antigos do pip
      if: always()
      run: |
        pip cache purge
        rm -rf ~/.cache/pip
