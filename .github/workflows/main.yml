name: 🧬 ATENA Ω - Evolução Divina v4.2 (DeepSeek-R1 Edition)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      model_size:
        description: 'Tamanho do modelo DeepSeek-R1'
        required: true
        default: '1.5B'
        type: choice
        options:
          - '1.5B'
          - '7B'
      generations:
        description: 'Número de gerações por ciclo'
        required: true
        default: '30'
        type: choice
        options:
          - '30'
          - '600'
          - '700'
          - '800'
          - '2500'
      mode:
        description: 'Modo de evolução'
        required: true
        default: 'auto'
        type: choice
        options:
          - 'auto'
          - 'recon'
          - 'nocode'

permissions:
  contents: write
  actions: write

jobs:
  evoluir:
    name: 🧠 Evolução Neural (${{ matrix.model_size }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        model_size: [1.5B] 
    
    env:
      PYTHON_VERSION: '3.11'
      MODEL_SIZE: ${{ github.event.inputs.model_size || matrix.model_size }}
      GENERATIONS: ${{ github.event.inputs.generations || '30' }}
      MODE: ${{ github.event.inputs.mode || 'auto' }}

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 🔧 Instalar dependências
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y sqlite3
        python -m pip install --upgrade pip
        python -m pip install requests torch transformers accelerate faiss-cpu astor

    - name: 📂 Preparar Estrutura
      run: |
        mkdir -p atena_evolution/knowledge atena_evolution/logs atena_evolution/code

    - name: 🧠 Baixar Evolução Anterior (Persistência)
      id: download-brain
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: atena-brain-${{ env.MODEL_SIZE }}
        path: atena_evolution/
      # O continue-on-error garante que se o artefato não existir (1ª run), o workflow não pare.

    - name: 🔮 Executar ATENA Core
      run: |
        echo "🚀 Iniciando motor DeepSeek-R1-${{ env.MODEL_SIZE }}..."
        # Certifique-se que o main.py busca o DB em atena_evolution/knowledge/
        python core/main.py --auto --cycles ${{ env.GENERATIONS }} --mode ${{ env.MODE }}

    - name: ⬆️ Salvar Evolução Atualizada
      if: always() # Salva mesmo se o Core falhar, para não perder logs
      uses: actions/upload-artifact@v4
      with:
        name: atena-brain-${{ env.MODEL_SIZE }}
        path: |
          atena_evolution/knowledge/
          atena_evolution/logs/
        retention-days: 3
        overwrite: true
