name: 🧬 ATENA Ω - Evolução Divina v40.6 Genesis

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      generations:
        description: 'Gerações'
        default: '30'
        type: choice
        options: ['3', '10', '30', '50']

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONPATH: "${{ github.workspace }}:${{ github.workspace }}/modules"
  XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
  NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  ATENA_MAX_RUNTIME: "300"

jobs:
  evoluir:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GH_TOKEN }}

    - name: 🐍 Setup Python & Node
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: 🔧 Configurar Git Identidade
      run: |
        git config --global user.name "ATENA Ω"
        git config --global user.email "atena@evolution.ai"

    - name: 📦 Instalação Completa
      run: |
        python -m pip install --upgrade pip
        pip install astor radon requests numpy scikit-learn psutil aiosqlite beautifulsoup4 huggingface_hub
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install faiss-cpu
        npm install -g tsx typescript

    - name: 🧹 Sanitize Code
      run: find . -name "*.py" -exec sed -i 's/[^\x00-\x7F]//g' {} +

    - name: 🧠 Restaurar Memória (Artifacts)
      run: |
        ARTIFACT_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=1" \
          --jq '.artifacts[0].id' 2>/dev/null || echo "")
        if [ -n "$ARTIFACT_ID" ]; then
          gh api "repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip" > brain.zip
          unzip -q -o brain.zip -d . && rm brain.zip
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    - name: 🔮 Executar ATENA Core (Deep Evolution)
      run: |
        # Execução principal com os 5 minutos de varredura
        python main.py --auto --cycles ${{ github.event.inputs.generations || '10' }} --deep

    - name: 📤 Push Mutações (DNA Evolution)
      if: always()
      run: |
        git add .
        if ! git diff --cached --quiet; then
          git commit -m "🧬 Evolution Cycle: ${{ github.run_id }} [System Self-Mod]"
          git push origin main
        else
          echo "Nenhuma mutação estrutural detectada neste ciclo."
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

    - name: 💾 Backup Hugging Face (Memória Externa)
      if: env.HF_TOKEN != ''
      run: |
        python -c "from huggingface_hub import HfApi; api = HfApi(); api.upload_folder(folder_path='atena_evolution/knowledge', repo_id='${{ github.repository_owner }}/atena-memory', token='${{ env.HF_TOKEN }}', repo_type='dataset')"
      continue-on-error: true

    - name: 📦 Persistência Total
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: atena-brain-${{ github.run_id }}
        path: |
          atena_evolution/knowledge/
          atena_evolution/lm/model/
          atena_evolution/reference_dna/
          atena_evolution/topics/
          atena_evolution/logs/
        retention-days: 7
