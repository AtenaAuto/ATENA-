name: 🧬 ATENA Ω - Evolução Divina v40.0 Genesis

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      generations:
        description: 'Número de gerações'
        required: true
        default: '30'
        type: choice
        options: ['3', '5', '10', '20', '50']
      mode:
        description: 'Modo de evolução'
        required: true
        default: 'auto'
        type: choice
        options: ['auto', 'recon', 'nocode']
      deep_self_mod:
        description: 'Permite modificar o próprio engine'
        required: false
        default: true
        type: boolean
      lm_enabled:
        description: 'Ativa AtenaLocalLM'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  actions: write

concurrency:
  group: atena-evolution
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  GENERATIONS: ${{ github.event.inputs.generations || '10' }}
  MODE: ${{ github.event.inputs.mode || 'auto' }}
  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
  ALLOW_DEEP_SELF_MOD: ${{ github.event.inputs.deep_self_mod == 'true' && 'true' || 'false' }}
  ATENA_LM_ENABLED: ${{ github.event.inputs.lm_enabled != 'false' && 'true' || 'false' }}
  # Configuração de Caminhos para o novo main.py
  PYTHONPATH: "${{ github.workspace }}:${{ github.workspace }}/modules"
  ATENA_REFERENCE_DNA: "atena_evolution/reference_dna"

jobs:
  evoluir:
    name: 🧠 Evolução Neural + DNA Assimilation
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: ⚡ Banner
      run: |
        echo "╔═══════════════════════════════════════════════════════╗"
        echo "║     ATENA Ω - GENESIS v40.0 | DNA ASSIMILATED         ║"
        echo "╚═══════════════════════════════════════════════════════╝"

    - name: 📥 Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 🚀 Setup Bun (Runtime para DNA TypeScript)
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: 📦 Instalar Dependências de Sistema
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y sqlite3 jq tesseract-ocr
        npm install -g tsx  # Executor rápido de TS para o Python chamar

    - name: 📦 Instalar Dependências Python
      run: |
        python -m pip install --upgrade pip
        pip install astor radon requests numpy scikit-learn psutil
        pip install beautifulsoup4 huggingface_hub
        if [ "${{ env.ATENA_LM_ENABLED }}" == "true" ]; then
          pip install torch --index-url https://download.pytorch.org/whl/cpu
        fi

    - name: 📂 Garantir Estrutura de Pastas
      run: |
        mkdir -p atena_evolution/reference_dna \
                 atena_evolution/knowledge \
                 atena_evolution/lm/model \
                 modules \
                 atena_evolution/logs

    - name: 🧠 Restaurar Memória (Artifacts)
      run: |
        ARTIFACT_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=5" \
          --jq '.artifacts | map(select(.name | startswith("atena-brain-"))) | sort_by(.created_at) | reverse | .[0].id' 2>/dev/null || echo "")
        if [ -n "$ARTIFACT_ID" ] && [ "$ARTIFACT_ID" != "null" ]; then
          gh api "repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip" > brain.zip
          unzip -q -o brain.zip -d . && rm brain.zip
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    - name: 🔮 Executar ATENA Core (O Orquestrador)
      run: |
        EXTRA_ARGS=""
        [ "${{ env.ALLOW_DEEP_SELF_MOD }}" == "true" ] && EXTRA_ARGS="$EXTRA_ARGS --deep"
        
        if [ "${{ env.MODE }}" == "recon" ]; then
          python main.py --recon "advanced optimization" $EXTRA_ARGS
        else
          python main.py --auto --cycles ${{ env.GENERATIONS }} $EXTRA_ARGS
        fi

    - name: 💾 Salvar Evolução (Persistência)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: atena-brain-${{ github.run_id }}
        path: |
          atena_evolution/knowledge/
          atena_evolution/lm/model/
          atena_evolution/reference_dna/
        retention-days: 7

    - name: ✅ Finalização
      if: always()
      run: echo "🚀 Ciclo v40.0 concluído com sucesso."
