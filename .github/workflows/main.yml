name: ATENA-EVO-7B

on:
  workflow_dispatch:
    inputs:
      generations:
        description: 'Ciclos de Evolução'
        default: '60'
        required: true
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write
  actions: write

jobs:
  run-evolution:
    runs-on: ubuntu-latest
    env:
      # Definindo o cérebro mais potente (7B)
      LLM_MODEL: "deepseek-ai/DeepSeek-R1-Distill-Qwen-7B"
      PYTHONPATH: "${{ github.workspace }}:${{ github.workspace }}/core"
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:true"

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔧 Instalar Deps de Alta Performance
        run: |
          python -m pip install --upgrade pip
          pip install requests torch transformers accelerate faiss-cpu astor sentence-transformers aiosqlite aiohttp

      - name: 🧠 Carregar Memória Anterior
        uses: dawidd6/action-download-artifact@v3
        continue-on-error: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          name: atena-brain
          path: atena_evolution/

      - name: 🚀 Executar Evolução Divina (7B)
        run: |
          # Executa o motor com o novo limite de gerações
          python core/main.py --auto --cycles ${{ github.event.inputs.generations || '60' }}

      - name: ⬆️ Salvar Novo Conhecimento
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atena-brain
          path: atena_evolution/
          retention-days: 5
          overwrite: true
          
