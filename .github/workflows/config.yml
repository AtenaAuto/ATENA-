# .github/workflows/config.yml
# Configurações globais para workflows

env:
  ARTIFACT_RETENTION: 30
  CACHE_VERSION: v1
  RUBY_VERSION: "3.2"
  NODE_VERSION: "18"
  PYTHON_VERSION: "3.10"

# Secrets necessários (configure no GitHub):
# - XAI_API_KEY: Token da API Grok (ATENA)
# - GH_TOKEN: Token do GitHub
# - SLACK_WEBHOOK: Webhook do Slack (opcional)
# - NPM_TOKEN: Token npm (se usar privado)
```

---

## 🎯 Melhorias Implementadas

| Funcionalidade | Antes | Depois |
|---|---|---|
| **Validação** | Nenhuma | YAML, links, segurança, dependências |
| **Testes** | Nenhum | Multi-versão Ruby + Jekyll |
| **ATENA** | Não existia | Integrado com ciclos configuráveis |
| **Performance** | Sem análise | Relatório de tamanho e assets |
| **Segurança** | Nenhuma | SAST, bundle audit, análise de padrões |
| **Notificações** | Nenhuma | PR comments, Slack, GitHub |
| **Artifacts** | Mantém para sempre | Limpeza automática (30 dias) |
| **Cache** | Nenhum | Ruby gems, npm, Python |
| **Monitoramento** | Nenhum | Logs, relatórios, status | 
| **Deploy** | Simples | Condicional com validação |

---

## 🚀 Como Usar

1. **Substitua** `.github/workflows/jekyll-gh-pages.yml` por este novo workflow

2. **Configure secrets** no GitHub (Settings → Secrets):
```
   XAI_API_KEY=sk-...
   GH_TOKEN=ghp_...
   SLACK_WEBHOOK=https://hooks.slack.com/...
```

3. **Trigger manual** com parâmetros:
```
   Actions → Deploy Atena + Jekyll 
   → Run workflow 
   → enable_atena: true
   → atena_cycles: 10
